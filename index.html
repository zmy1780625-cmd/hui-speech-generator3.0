<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晖总演讲稿生成器 - GitHub Pages版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        
        .title {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .input-section, .output-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        
        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .api-key-input {
            position: relative;
        }
        
        .api-key-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 14px;
        }
        
        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .generate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .output-content {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            border: 2px solid #e1e5e9;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-style: italic;
        }
        
        .error {
            color: #dc3545;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
        }
        
        .success {
            color: #155724;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
        }
        
        .info-box {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .info-box h4 {
            color: #1976d2;
            margin-bottom: 10px;
        }
        
        .info-box p {
            color: #424242;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        
        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .copy-btn:hover {
            background: #218838;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .title {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">🎤 晖总演讲稿生成器</h1>
            <p class="subtitle">GitHub Pages版 - 直连GLM API</p>
        </div>
        
        <div class="info-box">
            <h4>📝 使用说明</h4>
            <p>• 这是GitHub Pages版本，直接调用GLM API，无需后端服务器</p>
            <p>• 请输入你的GLM API密钥（密钥仅在本地使用，不会上传到服务器）</p>
            <p>• 支持多种演讲类型和语音风格自定义</p>
        </div>
        
        <div class="main-content">
            <div class="input-section">
                <h2 class="section-title">📋 演讲配置</h2>
                
                <div class="form-group">
                    <label for="apiKey">GLM API密钥 *</label>
                    <div class="api-key-input">
                        <input type="password" id="apiKey" placeholder="请输入你的GLM API密钥">
                        <button type="button" class="api-key-toggle" onclick="toggleApiKey()">显示</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="topic">演讲主题 *</label>
                    <input type="text" id="topic" placeholder="例如：人工智能的未来发展">
                </div>
                
                <div class="form-group">
                    <label for="type">演讲类型</label>
                    <select id="type">
                        <option value="keynote">主题演讲</option>
                        <option value="presentation">工作汇报</option>
                        <option value="conference">会议发言</option>
                        <option value="training">培训讲座</option>
                        <option value="ceremony">庆典致辞</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="duration">演讲时长</label>
                    <select id="duration">
                        <option value="5">5分钟</option>
                        <option value="10" selected>10分钟</option>
                        <option value="15">15分钟</option>
                        <option value="20">20分钟</option>
                        <option value="30">30分钟</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="audience">目标听众</label>
                    <input type="text" id="audience" placeholder="例如：技术团队、管理层、客户等">
                </div>
                
                <div class="form-group">
                    <label for="style">演讲风格</label>
                    <select id="style">
                        <option value="professional">专业正式</option>
                        <option value="friendly">亲和友好</option>
                        <option value="inspiring">激励鼓舞</option>
                        <option value="humorous">幽默风趣</option>
                        <option value="academic">学术严谨</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="keyPoints">关键要点（可选）</label>
                    <textarea id="keyPoints" placeholder="请列出你希望在演讲中强调的关键要点，每行一个要点"></textarea>
                </div>
                
                <button class="generate-btn" onclick="generateSpeech()">
                    🎯 生成演讲稿
                </button>
            </div>
            
            <div class="output-section">
                <h2 class="section-title">📄 生成结果</h2>
                <div id="output" class="output-content">
                    点击"生成演讲稿"开始创建你的专属演讲内容...
                </div>
                <button class="copy-btn" onclick="copyToClipboard()" style="display: none;" id="copyBtn">
                    📋 复制演讲稿
                </button>
            </div>
        </div>
    </div>

    <script>
        let isApiKeyVisible = false;
        
        function toggleApiKey() {
            const apiKeyInput = document.getElementById('apiKey');
            const toggleBtn = document.querySelector('.api-key-toggle');
            
            if (isApiKeyVisible) {
                apiKeyInput.type = 'password';
                toggleBtn.textContent = '显示';
                isApiKeyVisible = false;
            } else {
                apiKeyInput.type = 'text';
                toggleBtn.textContent = '隐藏';
                isApiKeyVisible = true;
            }
        }
        
        async function generateSpeech() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const topic = document.getElementById('topic').value.trim();
            const type = document.getElementById('type').value;
            const duration = document.getElementById('duration').value;
            const audience = document.getElementById('audience').value.trim();
            const style = document.getElementById('style').value;
            const keyPoints = document.getElementById('keyPoints').value.trim();
            
            const output = document.getElementById('output');
            const generateBtn = document.querySelector('.generate-btn');
            const copyBtn = document.getElementById('copyBtn');
            
            // 验证必填字段
            if (!apiKey) {
                output.innerHTML = '<div class="error">❌ 请输入GLM API密钥</div>';
                return;
            }
            
            if (!topic) {
                output.innerHTML = '<div class="error">❌ 请输入演讲主题</div>';
                return;
            }
            
            // 开始生成
            generateBtn.disabled = true;
            generateBtn.textContent = '🔄 生成中...';
            output.innerHTML = '<div class="loading">🤖 AI正在为您精心创作演讲稿，请稍候...</div>';
            copyBtn.style.display = 'none';
            
            try {
                // 构建提示词
                const typeMap = {
                    'keynote': '主题演讲',
                    'presentation': '工作汇报',
                    'conference': '会议发言',
                    'training': '培训讲座',
                    'ceremony': '庆典致辞'
                };
                
                const styleMap = {
                    'professional': '专业正式',
                    'friendly': '亲和友好',
                    'inspiring': '激励鼓舞',
                    'humorous': '幽默风趣',
                    'academic': '学术严谨'
                };
                
                let prompt = `请为我创作一篇${typeMap[type]}的演讲稿，要求如下：

📋 基本信息：
- 演讲主题：${topic}
- 演讲时长：${duration}分钟
- 目标听众：${audience || '通用听众'}
- 演讲风格：${styleMap[style]}

📝 内容要求：
1. 结构清晰，包含开场白、主体内容、结尾总结
2. 语言${styleMap[style]}，符合${typeMap[type]}的特点
3. 内容充实，时长控制在${duration}分钟左右
4. 适合${audience || '通用听众'}的理解水平`;

                if (keyPoints) {
                    prompt += `\n\n🎯 关键要点：\n${keyPoints}`;
                }

                prompt += `\n\n请直接输出演讲稿内容，不需要额外的说明文字。`;
                
                // 调用GLM API
                const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'glm-4-plus',
                        messages: [
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 4000
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`API请求失败 (${response.status}): ${errorData.error?.message || '未知错误'}`);
                }
                
                const data = await response.json();
                
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    const speechContent = data.choices[0].message.content;
                    output.innerHTML = `<div class="success">✅ 演讲稿生成成功！</div>\n\n${speechContent}`;
                    copyBtn.style.display = 'inline-block';
                } else {
                    throw new Error('API返回数据格式异常');
                }
                
            } catch (error) {
                console.error('生成演讲稿失败:', error);
                output.innerHTML = `<div class="error">❌ 生成失败：${error.message}</div>`;
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '🎯 生成演讲稿';
            }
        }
        
        function copyToClipboard() {
            const output = document.getElementById('output');
            const text = output.textContent;
            
            navigator.clipboard.writeText(text).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ 已复制';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败，请手动选择文本复制');
            });
        }
        
        // 回车键快捷生成
        document.addEventListener('keydown', function(event) {
            if (event.ctrlKey && event.key === 'Enter') {
                generateSpeech();
            }
        });
    </script>
</body>
</html>
