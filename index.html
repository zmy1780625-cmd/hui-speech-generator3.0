<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晖总演讲稿生成器 - GitHub Pages版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        
        .title {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .input-section, .output-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        
        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .api-key-input {
            position: relative;
        }
        
        .api-key-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 14px;
        }
        
        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .generate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .output-content {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            border: 2px solid #e1e5e9;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-style: italic;
        }
        
        .error {
            color: #dc3545;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
        }
        
        .success {
            color: #155724;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
        }
        
        .info-box {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .info-box h4 {
            color: #1976d2;
            margin-bottom: 10px;
        }
        
        .info-box p {
            color: #424242;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        
        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .copy-btn:hover {
            background: #218838;
        }
        
        .word-count {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 5px;
            padding: 8px 12px;
            margin-top: 10px;
            font-size: 14px;
            color: #2e7d32;
            text-align: center;
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f2f5;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        
        .stat-label {
            color: #666;
            font-size: 12px;
        }
        
        .stat-value {
            color: #333;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .title {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">🎤 杨晖演讲稿生成器</h1>
            <p class="subtitle">GitHub Pages版 - 基于杨晖演讲风格的AI生成器</p>
        </div>
        
        <div class="info-box">
            <h4>📝 杨晖演讲风格深度学习</h4>
            <p>• 本系统已深度学习杨晖（腾讯教育高管）的<strong>十篇完整演讲稿</strong>和表达模式</p>
            <p>• 涵盖技术创新、产品战略、生态合作、国际化布局、AI应用等多个维度</p>
            <p>• 能够在任何场景下生成高度贴近真实的杨晖式演讲内容</p>
            <p>• 请输入GLM API密钥开始生成专属的杨晖风格演讲稿</p>
        </div>
        
        <div class="main-content">
            <div class="input-section">
                <h2 class="section-title">📋 演讲配置</h2>
                
                <div class="form-group">
                    <label for="apiKey">GLM API密钥 *</label>
                    <div class="api-key-input">
                        <input type="password" id="apiKey" placeholder="请输入你的GLM API密钥">
                        <button type="button" class="api-key-toggle" onclick="toggleApiKey()">显示</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="topic">演讲主题 *</label>
                    <input type="text" id="topic" placeholder="例如：人工智能的未来发展">
                </div>
                
                <div class="form-group">
                    <label for="type">演讲类型</label>
                    <select id="type">
                        <option value="keynote">主题演讲</option>
                        <option value="presentation">工作汇报</option>
                        <option value="conference">会议发言</option>
                        <option value="training">培训讲座</option>
                        <option value="ceremony">庆典致辞</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="duration">演讲时长</label>
                    <select id="duration">
                        <option value="5">5分钟</option>
                        <option value="10" selected>10分钟</option>
                        <option value="15">15分钟</option>
                        <option value="20">20分钟</option>
                        <option value="30">30分钟</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="audience">目标听众</label>
                    <select id="audience">
                        <option value="management">管理层</option>
                        <option value="tech">技术团队</option>
                        <option value="client">客户</option>
                        <option value="employee">员工</option>
                        <option value="public">公众</option>
                        <option value="student">学生</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="style">演讲风格</label>
                    <select id="style">
                        <option value="professional">专业正式</option>
                        <option value="friendly">亲和友好</option>
                        <option value="inspiring">激励鼓舞</option>
                        <option value="humorous">幽默风趣</option>
                        <option value="academic">学术严谨</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="keyPoints">关键要点（可选）</label>
                    <textarea id="keyPoints" placeholder="请列出你希望在演讲中强调的关键要点，每行一个要点"></textarea>
                </div>
                
                <button class="generate-btn" onclick="generateSpeech()">
                    🎯 生成演讲稿
                </button>
            </div>
            
            <div class="output-section">
                <h2 class="section-title">📄 生成结果</h2>
                <div class="stats-bar" id="statsBar" style="display: none;">
                    <div class="stat-item">
                        <span class="stat-label">字数统计</span>
                        <span class="stat-value" id="wordCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">预计时长</span>
                        <span class="stat-value" id="estimatedTime">0分钟</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">段落数</span>
                        <span class="stat-value" id="paragraphCount">0</span>
                    </div>
                </div>
                <div id="output" class="output-content">
                    点击"生成演讲稿"开始创建你的专属演讲内容...
                </div>
                <button class="copy-btn" onclick="copyToClipboard()" style="display: none;" id="copyBtn">
                    📋 复制演讲稿
                </button>
            </div>
        </div>
    </div>

    <script>
        let isApiKeyVisible = false;
        
        function toggleApiKey() {
            const apiKeyInput = document.getElementById('apiKey');
            const toggleBtn = document.querySelector('.api-key-toggle');
            
            if (isApiKeyVisible) {
                apiKeyInput.type = 'password';
                toggleBtn.textContent = '显示';
                isApiKeyVisible = false;
            } else {
                apiKeyInput.type = 'text';
                toggleBtn.textContent = '隐藏';
                isApiKeyVisible = true;
            }
        }
        
        function getAudienceText(audienceType) {
            const audienceMap = {
                'tech': '技术团队',
                'management': '管理层',
                'client': '客户',
                'employee': '员工',
                'public': '公众',
                'student': '学生'
            };
            return audienceMap[audienceType] || '通用听众';
        }
        
        function updateWordCount(text) {
            if (!text || text.includes('生成中') || text.includes('失败')) {
                document.getElementById('statsBar').style.display = 'none';
                return;
            }
            
            // 计算字数（中文字符 + 英文单词）
            const chineseChars = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
            const englishWords = (text.match(/[a-zA-Z]+/g) || []).length;
            const totalWords = chineseChars + englishWords;
            
            // 计算段落数
            const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length;
            
            // 估算演讲时长（按每分钟200字计算）
            const estimatedMinutes = Math.ceil(totalWords / 200);
            
            // 更新显示
            document.getElementById('wordCount').textContent = totalWords;
            document.getElementById('estimatedTime').textContent = estimatedMinutes + '分钟';
            document.getElementById('paragraphCount').textContent = paragraphs;
            document.getElementById('statsBar').style.display = 'flex';
        }
        
        async function generateSpeech() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const topic = document.getElementById('topic').value.trim();
            const type = document.getElementById('type').value;
            const duration = document.getElementById('duration').value;
            const audience = document.getElementById('audience').value;
            const style = document.getElementById('style').value;
            const keyPoints = document.getElementById('keyPoints').value.trim();
            
            const output = document.getElementById('output');
            const generateBtn = document.querySelector('.generate-btn');
            const copyBtn = document.getElementById('copyBtn');
            
            // 验证必填字段
            if (!apiKey) {
                output.innerHTML = '<div class="error">❌ 请输入GLM API密钥</div>';
                return;
            }
            
            if (!topic) {
                output.innerHTML = '<div class="error">❌ 请输入演讲主题</div>';
                return;
            }
            
            // 开始生成
            generateBtn.disabled = true;
            generateBtn.textContent = '🔄 生成中...';
            output.innerHTML = '<div class="loading">🤖 AI正在为您精心创作演讲稿，请稍候...</div>';
            copyBtn.style.display = 'none';
            document.getElementById('statsBar').style.display = 'none';
            
            try {
                // 构建提示词
                const typeMap = {
                    'keynote': '主题演讲',
                    'presentation': '工作汇报',
                    'conference': '会议发言',
                    'training': '培训讲座',
                    'ceremony': '庆典致辞'
                };
                
                const styleMap = {
                    'professional': '专业正式',
                    'friendly': '亲和友好',
                    'inspiring': '激励鼓舞',
                    'humorous': '幽默风趣',
                    'academic': '学术严谨'
                };
                
                const audienceText = getAudienceText(audience);
                
                let prompt = `请严格模仿杨晖（腾讯教育高管）的演讲风格，为我创作一篇${typeMap[type]}的演讲稿。

🎯 杨晖演讲风格深度分析（基于十篇完整演讲稿学习）：

【开场特色】
- 时代背景：从宏观环境入手（如"2022年，疫情、俄乌战争让我们真实地感受到..."）
- 国际视野：全球市场趋势分析开场
- 亲和问候："大家下午好，我是来自腾讯教育的杨晖"或"各位老师、各位教育工作者们、各位朋友们，大家好！"
- 自我介绍："我是腾讯教育杨晖"或"我是腾讯教育企业行业总经理杨晖"
- 个人背景：技术出身（"我是腾讯的老员工，07年加入腾讯，然后一直从事了十几年的研发工作，是一位程序员"）
- 业务定位：简洁介绍腾讯教育的核心价值和自己的职责范围
- 主题引入：直接点题，表达分享意愿
- 结构预告："今天的分享分为三个部分"或"今天我主要围绕X个方向/维度进行分享"

【内容架构】
- 三段式结构：趋势分析 → 产品落地 → 创新展望
- 问题导向：如何深入场景？→ 举例说明 → 总结思考
- 时间脉络：用具体年份构建发展历程（如2017-2025）
- 技术层级：引用分级框架（如L1-L5系统）
- 数据支撑：大量具体数字和案例（30万+客户等）
- 市场分析：区域化视角，文化差异洞察
- 行业观察：多维度现象分析，正反面对比
- 全球布局：国际市场分类（成熟市场、新兴市场、其他市场）
- 教培分析：布局→方向→复盘→洞察的完整逻辑链条
- OMO模式：在线化→数据化→智能化的三阶段演进

【语言特点】
- 技术专业：准确使用AI、大模型、智能体、全真互联、TRTC、CDN、OMO等术语
- 谦逊定位：强调"助手"、"服务商"、"赋能者"角色
- 合作理念：频繁提及"携手"、"共同"、"生态"、"伙伴"
- 敬畏教育：强调"敬畏教育"、"回归教育本质"
- 愿景驱动：以使命和价值观收尾
- 国际视野：海外市场分析，文化差异理解
- 韧性思维：长期价值坚守，行业韧性观察
- 公益情怀：社会责任担当，教育公益属性
- 全球化思维：跨国业务理解，合规安全意识
- 行业洞察：深度的教培行业理解和前瞻性判断
- 个人化表达：技术出身的亲和力和专业性结合
- AI技术深度：大模型演进理解，教育场景深度应用，产业化落地经验
- 科研驱动：实验室体系化布局，专利论文积累，产学研深度融合
- 云服务架构：三云战略思维，生态合作理念，算力服务体系，一站式解决方案

【表达习惯】
- 承上启下："接下来介绍..."、"以...为例"、"给大家举两个例子"
- 数据罗列：具体的用户数、学校数、作品数、客户数、节点数、带宽数据
- 案例支撑：LingoACE、小鹅通、英孚英语、VIPKID、猿辅导、好未来等真实客户案例
- 技术细节：详细的产品功能和技术架构
- 反问引导："我们的行业技术发展该走向何处？"、"教育的新蓝海在哪里？"
- 市场洞察：基于实际合作经验的市场分析
- 比喻生动：如"淘金的人很难，但卖铲子的人依旧挣到了钱"、"教育行业跟农业有点像，春天播种，秋天收割"
- 节奏调整：从"百米冲刺"到"马拉松"的战略思考
- 口号提出：如"全球一套云，中外不分家"
- 挑战分析：安全合规、用户体验、成本可控三大挑战框架
- 历史回顾：通过时间节点梳理行业发展脉络
- 未来预判：基于数据和趋势的前瞻性判断
- 激励表达：以个人成长和行业发展的正向激励结尾
- 比喻生动：如"淘金的人很难，但卖铲子的人依旧挣到了钱"
- 节奏调整：从"百米冲刺"到"马拉松"的战略思考
- 场景深入：从技术到具体教学场景的深度分析

【垂直深耕特色】
- 场景细分：不同学科、不同年龄段的具体需求差异
- 技术应用：从通用技术到教育场景的深度适配
- 客户合作：强调与合作伙伴共同研发的重要性
- 教育本质：技术服务于教学，尊重教育规律

📋 基本信息：
- 演讲主题：${topic}
- 演讲时长：${duration}分钟
- 目标听众：${audienceText}
- 演讲风格：${styleMap[style]}

📝 内容要求：
1. 开场：亲切问候 + 荣幸表达 + 主题引入 + 结构预告
2. 主体：按2-4个维度展开，每个维度包含：
   - 趋势分析（含时间线和数据）
   - 产品落地（具体案例和技术细节）
   - 创新应用（实际效果和用户反馈）
3. 结尾：愿景展望 + 使命表达 + 合作邀请 + 感谢致辞
4. 语言${styleMap[style]}，体现腾讯教育的技术实力和服务理念
5. 时长控制在${duration}分钟左右，适合${audienceText}理解`;

                if (keyPoints) {
                    prompt += `\n\n🎯 关键要点：\n${keyPoints}`;
                }

                prompt += `\n\n📚 杨晖演讲风格参考样本（基于十篇完整演讲稿）：

【个人背景开场】
"大家下午好，我是来自腾讯教育的杨晖，今天主要讲一下腾讯教育对教育的一些思考。首先自我介绍一下，我是腾讯的老员工，07年加入腾讯，然后一直从事了十几年的研发工作，是一位程序员。"

【业务布局介绍】
"从业务版图来讲的话：我们整个腾讯教育服务的对象分三块。一个是学校，包括我们K12的学校，还有小学初中高中，还有高校。然后另外的话我们也服务我们的教育主管部门...针对企业的话，这一块主要是我在负责。"

【行业比喻示例】

【AI技术演进开场】
"我是来自腾讯教育的杨晖，今天分享的主题是《腾讯教育AI时代的探索和创新》。首先回顾一下教育科技的历史，我们可以看到科技的发展始终是推动教育变革的重要力量。"

【技术发展时间线】
"从最传统的纸笔、黑板教学，发展到电化教育，再到计算机辅导教学和学习，进入90年代，网络技术的发展，使得在线远程教育和移动教育成为可能。进入21世纪，随着大数据、云计算、AI等新技术的融合应用，我们迎来了智能教育的新阶段。"

【AI发展节点】
"自2022年11月ChatGPT爆火，我们看到了物理空间与数字空间的深度融合，促进了AI与教学、实践、管理的深度融合，开始构建'师-生-机'的教育教学新形态。"

【腾讯AI技术进展】
"继今年5月腾讯开源混元文生图大模型，这是首个中文原生DiT架构。11月5日，腾讯又开源了两个重磅模型，最新的MoE模型'混元Large'和记忆混元3D生成大模型'Hunyuan3D-1.0'。"

【教育大模型技术架构】
"教育大模型，是以混元大模型为基座模型，再经过超过100B+ token数据的增量训练，以及有监督训练，结合专家反馈，对模型进行强化学习增强，形成了教育大模型。"

【应用场景深度分析】
"大模型的出口还是在应用层，围绕着营销、转化、授课、服务、教研、师训、管理等各环节进行AI应用的开发和大模型能力升级。最近一年多，腾讯教育也在和客户不断尝试。"

【具体案例展示】
"润泽园教育使用腾讯云AIGC方案实现了历史人物时空对话，王阳明先生跨越时空来到贵州龙场为学子传道授业，通过实时音视频TRTC、ASR、TTS、数智人、混元大模型为一体的解决方案快速实现。"

【技术优势对比】
"在生成系统中实测的批改耗时约8～10秒/篇，优于GPT4。并且，基于混元的MoE架构，相比dense结构，成本较低。且其批改能力的泛化能力更强，准确率达到90%以上。"

【人才培养战略】
"除了人工智能赋能教育，人工智能人才培养也是当下最迫切的一个命题。如果培养拔尖创新人才，加快新质生产力的发展。腾讯充分发挥自身的积累与优势，通过提供从理论到实训的体系化AI课程。"

请严格按照以上风格特点和样本模式，生成符合杨晖个人演讲特色的专业内容。直接输出演讲稿，无需额外说明。`;
                
                // 清理prompt中可能的问题字符
                prompt = prompt.replace(/[\u0000-\u001F\u007F-\u009F]/g, '');
                
                // 调用GLM API
                const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=utf-8',
                        'Authorization': 'Bearer ' + apiKey
                    },
                    body: JSON.stringify({
                        model: 'glm-4-plus',
                        messages: [
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 4000
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`API请求失败 (${response.status}): ${errorData.error?.message || '未知错误'}`);
                }
                
                const data = await response.json();
                
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    const speechContent = data.choices[0].message.content;
                    output.innerHTML = `<div class="success">✅ 演讲稿生成成功！</div>\n\n<div id="speechText">${speechContent}</div>`;
                    copyBtn.style.display = 'inline-block';
                    
                    // 更新字数统计
                    updateWordCount(speechContent);
                } else {
                    throw new Error('API返回数据格式异常');
                }
                
            } catch (error) {
                console.error('生成演讲稿失败:', error);
                output.innerHTML = `<div class="error">❌ 生成失败：${error.message}</div>`;
                document.getElementById('statsBar').style.display = 'none';
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '🎯 生成演讲稿';
            }
        }
        
        function copyToClipboard() {
            const speechTextElement = document.getElementById('speechText');
            const output = document.getElementById('output');
            
            // 优先复制纯净的演讲稿内容
            let text = '';
            if (speechTextElement) {
                text = speechTextElement.textContent;
            } else {
                // 如果没有找到speechText元素，则从整个output中提取
                text = output.textContent;
                if (text.includes('✅ 演讲稿生成成功！')) {
                    text = text.replace('✅ 演讲稿生成成功！', '').trim();
                }
            }
            
            if (!text || text.includes('生成中') || text.includes('失败') || text.includes('点击')) {
                alert('请先生成演讲稿内容');
                return;
            }
            
            navigator.clipboard.writeText(text).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ 已复制';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败，请手动选择文本复制');
            });
        }
        
        // 回车键快捷生成
        document.addEventListener('keydown', function(event) {
            if (event.ctrlKey && event.key === 'Enter') {
                generateSpeech();
            }
        });
